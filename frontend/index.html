<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empleados — Tarea 1 BD1</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #00d4ff;
      --accent2: #ff6b35;
      --text: #e8e8e8;
      --muted: #666;
      --success: #4ade80;
      --error: #f87171;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem 1.5rem;
    }

    /* Header */
    header {
      max-width: 860px;
      margin: 0 auto 3rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.25rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    header span {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* Layout */
    main {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      gap: 2.5rem;
    }

    section h2 {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* Tabla */
    .table-wrapper {
      overflow-x: auto;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #1c1c1c;
    }

    tbody td {
      padding: 0.8rem 1rem;
      font-family: var(--sans);
    }

    tbody td:first-child {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
    }

    tbody td.salario {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--accent);
    }

    .empty-row td {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 2rem;
      font-family: var(--mono);
    }

    /* Formulario */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.75rem;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.9rem;
      padding: 0.6rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: var(--muted);
    }

    button {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.65rem 1.25rem;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    button:hover {
      opacity: 0.85;
    }

    button:active {
      opacity: 0.7;
    }

    /* Mensaje feedback */
    #msg {
      font-family: var(--mono);
      font-size: 0.8rem;
      margin-top: 0.75rem;
      min-height: 1.2rem;
    }

    #msg.ok {
      color: var(--success);
    }

    #msg.error {
      color: var(--error);
    }

    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Empleados</h1>
    <span>Tarea 1 · Bases de Datos I · David Robles Vargas</span>
  </header>

  <main>
    <section>
      <h2>Registros</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Salario (₡)</th>
            </tr>
          </thead>
          <tbody id="tabla-body" hx-get="/api/empleados" hx-trigger="load, listaActualizada from:body">
            <tr class="empty-row">
              <td colspan="3">cargando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section>
      <h2>Insertar empleado</h2>
      <div class="form-card">
        <form hx-post="/api/empleados" hx-target="#msg" hx-on::after-request="if(event.detail.successful) this.reset()"
          class="form-grid">
          <div class="field">
            <label>Nombre</label>
            <input name="nombre" type="text" pattern="[A-Za-záéíóúÁÉÍÓÚñÑüÜ\s\-]+"
              title="Solo letras, espacios y guiones" required />
          </div>
          <div class="field">
            <label>Salario</label>
            <input name="salario" type="number" step="0.01" min="0.01" required />
          </div>
          <button type="submit">Insertar</button>
        </form>
        <div id="msg"></div>
      </div>
    </section>
  </main>
</body>

</html>
