<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Empleados</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
  <h1>Lista de Empleados</h1>
  <table border="1">
    <thead><tr><th>ID</th><th>Nombre</th><th>Salario</th></tr></thead>
    <tbody hx-get="/empleados" hx-trigger="load, empleadoInsertado from:body" hx-swap="innerHTML">
      <tr><td colspan="3">Cargando...</td></tr>
    </tbody>
  </table>

  <h2>Insertar</h2>
  <form hx-post="/empleados" hx-target="#msg" hx-swap="innerHTML">
    <input name="nombre"  placeholder="Nombre"  required>
    <input name="salario" placeholder="Salario" type="number" step="0.01" required>
    <button type="submit">Insertar</button>
  </form>
  <div id="msg"></div>
</body>
</html>
